---
name: Docker Security

"on":
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 4 * * 0"
  workflow_dispatch:
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

env:
  IMAGE_REF: ${{ github.repository }}:security-scan

jobs:
  security-scan:
    name: Security scan
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Load build environment
        id: env
        run: |
          set -a
          . ./build.env
          set +a
          echo "ODR_PADENC_VERSION=$ODR_PADENC_VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image for scanning
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          push: false
          pull: true
          load: true
          tags: ${{ env.IMAGE_REF }}
          build-args: |
            TOOL=odr-padenc
            VERSION=${{ steps.env.outputs.ODR_PADENC_VERSION }}

      - name: Trivy SARIF report
        if: >-
          github.event_name != 'pull_request' &&
          github.event.repository.private == false
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_REF }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH,MEDIUM
          scanners: vuln,secret
          ignore-unfixed: true
          exit-code: "0"
          limit-severities-for-sarif: true

      - name: Upload Trivy results to GitHub Security
        if: >-
          github.event_name != 'pull_request' &&
          github.event.repository.private == false
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif

      - name: Trivy high and critical summary
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_REF }}
          format: table
          severity: CRITICAL,HIGH
          scanners: vuln,secret
          ignore-unfixed: true
          exit-code: "0"
